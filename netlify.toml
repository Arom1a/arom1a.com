# Netlify Configuration
# This file configures build settings, redirects, and headers for Netlify

[build]
  # No special build settings needed - Astro handles this
  publish = "dist"

# Security headers that DON'T block search engine crawlers
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    
    # Content Security Policy (adjust as needed for your assets)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; media-src 'self'"

# Ensure crawlers can access sitemap and robots.txt
[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Content-Type = "application/xml"
    X-Robots-Tag = "noindex"  # Don't index the sitemap itself, but allow crawling

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"

# Cache static assets
[[headers]]
  for = "/global.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/aromia.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
